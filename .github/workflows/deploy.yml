name: Deploy to GitHub Pages

# Builds the Astro site and publishes it to GitHub Pages on every push to main.
# BASE_PATH is set automatically to the repo name, so the site works under
# username.github.io/<repo>/. To move to a custom domain later: add public/CNAME
# with the domain and delete this workflow (base falls back to '/').

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # `npm install` (not `npm ci`): Tailwind v4 → rolldown → a wasm binding
      # pulls a cross-platform optional dep (@emnapi) that resolves to different
      # versions on Windows (dev) vs Linux (CI), so strict `npm ci` fails on lock
      # drift. `npm install` reconciles it and builds reliably.
      - run: npm install --no-audit --no-fund
      - name: Build
        run: npm run build
        env:
          BASE_PATH: /${{ github.event.repository.name }}
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
